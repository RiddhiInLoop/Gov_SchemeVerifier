<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration - SchemeVerifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning border-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ GovScheme Verifier</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="schemes.html">Schemes</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-primary" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white p-4">
                        <h3 class="mb-0">Citizen Registration Portal</h3>
                        <small>Create your verified profile to check scheme eligibility.</small>
                    </div>
                    <div class="card-body p-4">
                        <form id="registerForm">
                            <h5 class="fw-bold mb-3 border-bottom pb-2">1. Personal Identity</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label for="regFirstName" class="form-label fw-bold">First Name <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regFirstName" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="regMiddleName" class="form-label fw-bold">Middle Name</label>
                                    <input type="text" class="form-control" id="regMiddleName">
                                </div>
                                <div class="col-md-4">
                                    <label for="regLastName" class="form-label fw-bold">Last Name <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regLastName" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-3">
                                    <label for="regAge" class="form-label fw-bold">Age <span
                                            class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="regAge" required min="10" max="150">
                                </div>
                                <div class="col-md-3">
                                    <label for="regGender" class="form-label fw-bold">Gender <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="regGender" required>
                                        <option value="">Select...</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="regCategory" class="form-label fw-bold">Category <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="regCategory" required>
                                        <option value="">Select...</option>
                                        <option value="General">General</option>
                                        <option value="SC">SC</option>
                                        <option value="ST">ST</option>
                                        <option value="OBC">OBC</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="regCitizenship" class="form-label fw-bold">Citizenship <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regCitizenship" value="Indian" required>
                                </div>
                            </div>

                            <h5 class="fw-bold mb-3 border-bottom pb-2">2. Socio-Economic Profile</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="regIncome" class="form-label fw-bold">Annual Income (₹) <span
                                            class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="regIncome" required min="0">
                                </div>
                                <div class="col-md-6">
                                    <label for="regResidenceType" class="form-label fw-bold">Residence Type <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="regResidenceType" required>
                                        <option value="">Select...</option>
                                        <option value="Owned">Owned</option>
                                        <option value="Rented">Rented</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <h5 class="fw-bold mb-3 border-bottom pb-2">3. Present Address</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-12">
                                    <label for="regArea" class="form-label fw-bold">Specific Area / Locality <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regArea" required>
                                </div>
                                <div class="col-md-8">
                                    <label for="regLandmark" class="form-label fw-bold">Nearest Landmark</label>
                                    <input type="text" class="form-control" id="regLandmark">
                                </div>
                                <div class="col-md-4">
                                    <label for="regPinCode" class="form-label fw-bold">PIN Code <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="regPinCode" required maxlength="10">
                                </div>
                            </div>

                            <h5 class="fw-bold mb-3 border-bottom pb-2">4. Account Security</h5>
                            <div class="row g-3">
                                <div class="col-sm-6 mt-4">
                                    <label class="form-label fw-bold">Email Address</label>
                                    <input type="email" class="form-control bg-light" id="regEmail" required>
                                </div>
                                <div class="col-sm-6 mt-4">
                                    <label class="form-label fw-bold">Password</label>
                                    <input type="password" class="form-control bg-light" id="regPassword" required
                                        minlength="6">
                                </div>
                                <div class="col-12 mt-4">
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" required>
                                        <label class="form-check-label text-muted small">
                                            I declare that the information provided is completely accurate.
                                        </label>
                                    </div>
                                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-2">Submit
                                        Registration</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>

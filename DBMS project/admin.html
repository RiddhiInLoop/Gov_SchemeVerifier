<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SchemeVerifier</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-dark">

    <div class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="text-white fw-bold">⚙️ SchemeVerifier Admin</h2>
                </div>

                <div class="card shadow-lg border-0 border-top border-warning border-4">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="mb-4 text-center fw-bold">Authorized Personnel Only</h4>

                        <div class="alert alert-danger d-none" id="loginError">
                            Invalid Admin credentials!
                        </div>

                        <form id="adminLoginForm">
                            <div class="mb-4">
                                <label for="username" class="form-label fw-bold text-muted">Admin Username</label>
                                <input type="email" class="form-control form-control-lg bg-light" id="username"
                                    placeholder="admin@gov.in" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-muted">Secure Password</label>
                                <input type="password" class="form-control form-control-lg bg-light" id="password"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm mb-3">Login to
                                Dashboard</button>

                            <div class="text-center mt-3">
                                <a href="index.html" class="text-secondary small text-decoration-none">← Back to Public
                                    Portal</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-white-50 small">Demo Credentials: admin@gov.in / admin123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Links -->
    <script src="js/app.js"></script>
</body>

</html>

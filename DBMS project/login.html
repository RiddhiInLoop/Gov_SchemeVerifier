<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login - SchemeVerifier</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning border-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ GovScheme Verifier</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="schemes.html">Schemes</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-warning fw-bold text-dark"
                            href="register.html">Register Now</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-dark text-white p-4 text-center">
                        <h4 class="mb-0">Secure Citizen Login</h4>
                        <small class="text-warning">Access your dashboard and application status.</small>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="loginEmail" class="form-label fw-bold text-muted">Registered Email
                                    Address</label>
                                <input type="email" class="form-control form-control-lg bg-light" id="loginEmail"
                                    placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="loginPassword" class="form-label fw-bold text-muted">Account
                                    Password</label>
                                <input type="password" class="form-control form-control-lg bg-light" id="loginPassword"
                                    placeholder="******" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3 shadow-sm">Login to
                                Portal</button>
                            <div class="text-center mt-3">
                                <a href="admin.html" class="text-secondary small text-decoration-none">Admin Area Login
                                    →</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Links -->
    <script src="js/app.js"></script>
</body>

</html>

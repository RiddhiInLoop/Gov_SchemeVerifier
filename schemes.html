<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Schemes - SchemeVerifier</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning border-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏛️ GovScheme Verifier</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schemes.html">Schemes</a></li>

                    <!-- Conditional rendering if logged in via JS -->
                    <li class="nav-item ms-lg-3 d-none" id="navDashboardLink">
                        <a class="btn btn-outline-light" href="dashboard.html">My Dashboard</a>
                    </li>
                    <li class="nav-item ms-lg-3" id="navLoginLink">
                        <a class="btn btn-primary" href="login.html">Citizen Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container py-5">
        <div class="row mb-4 bg-white p-4 rounded shadow-sm border-start border-primary border-5 align-items-center">
            <div class="col-md-7 mb-3 mb-md-0">
                <h2 class="fw-bold text-dark mb-1">National & State Schemes Catalog</h2>
                <p class="text-muted mb-0">Browse welfare programs below. Click "Check Eligibility" to see if your
                    demographic profile qualifies.</p>
            </div>
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-primary text-white border-primary"><i class="bi bi-search"></i>🔍</span>
                    <input type="text" id="schemeSearchInput" class="form-control border-primary" placeholder="Search schemes...">
                </div>
            </div>
        </div>

        <!-- The Schemes Container -->
        <div class="row g-4" id="schemesList">
            <!-- Loading indicator -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted fw-bold">Connecting to Central Government Database...</p>
            </div>
            <!-- JS will map the scheme cards here -->
        </div>
    </div>

    <!-- Script Links -->
    <script src="js/app.js"></script>
</body>

</html>
